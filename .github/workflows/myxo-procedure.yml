name: Myxo Procedure

on:
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: myxo-procedure-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  execute-procedure:
    if: "github.event.label.name == 'state: myxo-ready'"
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.MYXO_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Transition to active state
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --remove-label "state: myxo-ready" \
            --add-label "state: myxo-active"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Execute procedure
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Executing procedure for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"

      - name: Mark complete on success
        if: success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --remove-label "state: myxo-active" \
            --add-label "state: myxo-complete"

      - name: Mark abort on failure
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --remove-label "state: myxo-active" \
            --add-label "state: myxo-abort"
