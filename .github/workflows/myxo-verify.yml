name: Weekly myxo verify

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: myxo-verify
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Run mxl verify
        run: uv run mxl verify

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh issue list --repo "$REPO" --state open \
            --search "mxl verify drift detected" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" \
              --body "Drift still present. See [workflow run]($RUN_URL)."
          else
            gh issue create --repo "$REPO" \
              --title "mxl verify drift detected" \
              --body "Weekly verification failed. See [workflow run]($RUN_URL) for details." \
              --label "bug"
          fi
