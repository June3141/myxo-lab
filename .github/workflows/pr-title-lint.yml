name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python .github/scripts/pr-title-lint.py "$PR_TITLE"
