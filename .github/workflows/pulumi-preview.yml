name: Pulumi Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "infra/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pulumi-preview-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install infra dependencies
        working-directory: infra
        run: uv sync

      - name: Check Pulumi token
        id: check-token
        env:
          HAS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN != '' }}
        run: echo "has_token=$HAS_TOKEN" >> "$GITHUB_OUTPUT"

      - uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        if: steps.check-token.outputs.has_token == 'true'
        with:
          command: preview
          stack-name: dev
          work-dir: infra
          comment-on-pr: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Skip notice
        if: steps.check-token.outputs.has_token != 'true'
        run: echo "::notice::Pulumi preview skipped — PULUMI_ACCESS_TOKEN not configured"
