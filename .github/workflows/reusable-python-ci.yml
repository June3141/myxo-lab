name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version to use"
        type: string
        default: "3.13"
      run_tests:
        description: "Whether to run pytest"
        type: boolean
        default: true
      run_lint:
        description: "Whether to run ruff lint & format checks"
        type: boolean
        default: true
      run_type_check:
        description: "Whether to run ty type check"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  lint:
    if: inputs.run_lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ inputs.python_version }}
          enable-cache: true
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format
        run: uv run ruff format --check src/ tests/

  test:
    if: inputs.run_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ inputs.python_version }}
          enable-cache: true
      - name: Run tests with coverage
        run: uv run pytest -m "small or medium" --cov=src/myxo --cov-report=term-missing --cov-fail-under=80

  typecheck:
    if: inputs.run_type_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ inputs.python_version }}
          enable-cache: true
      - name: Type check
        run: uv run ty check src/
