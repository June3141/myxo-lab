[project]
name = "myxo"
version = "0.1.0"
description = "AI Agent Infrastructure Platform — inspired by the distributed intelligence of slime molds."
requires-python = ">=3.13"
dependencies = [
    "typer>=0.12",
    "httpx",
    "pyyaml",
    "rich",
]

[project.scripts]
myxo = "myxo.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/myxo"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
